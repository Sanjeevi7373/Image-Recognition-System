<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Recognition</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 { margin-bottom: 8px; font-weight: 800; }
        p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; }

        /* Preview Area */
        #preview-container {
            width: 100%;
            height: 200px;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #fafafa;
        }

        #image-preview {
            max-width: 100%;
            max-height: 100%;
            display: none; /* Hidden until image is chosen */
            object-fit: contain;
        }

        .placeholder-text { color: #9ca3af; font-size: 0.85rem; }

        input[type="file"] { margin-bottom: 20px; width: 100%; }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: #eef2ff;
            border-radius: 12px;
            border: 1px solid #e0e7ff;
        }

        .prediction-label {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.2rem;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Vision</h2>
    <p>Upload an image to identify its content.</p>

    <div id="preview-container">
        <span class="placeholder-text" id="placeholder">No image selected</span>
        <img src="" id="image-preview" alt="Preview">
    </div>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" id="imageInput" accept="image/*" required>
        <button type="submit">Analyze Image</button>
    </form>

    {% if prediction is not none %}
    <div class="result">
        <small style="color: #6366f1; text-transform: uppercase; letter-spacing: 1px;">Prediction</small>
        <span class="prediction-label">{{ prediction }}</span>
    </div>
    {% endif %}
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('image-preview');
    const placeholder = document.getElementById('placeholder');

    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                placeholder.style.display = 'none';
            }
            
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
